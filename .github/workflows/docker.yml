name: docker

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    if: github.repository == 'neodb-social/neodb-relay'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # Docker Hub publishing switches on automatically once the org's
      # DOCKERHUB_* secrets (shared with neodb-social/neodb's publish.yml)
      # are granted to this repo; until then only GHCR is pushed.
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Dockerfile runs `git describe --tags` to stamp the version
          fetch-depth: 0
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: env.HAS_DOCKERHUB == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: imgs
        run: |
          {
            echo 'images<<EOF'
            if [ "$HAS_DOCKERHUB" = "true" ]; then echo "neodb/neodb-relay"; fi
            echo "ghcr.io/$GITHUB_REPOSITORY"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.imgs.outputs.images }}
          tags: |
            type=raw,value=latest
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
